name: ess_app
description: "Employee Self-Service App with Glassmorphism UI"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.4
  google_mlkit_text_recognition: ^0.13.0
  google_mlkit_face_detection: ^0.11.0
  image_picker: ^1.1.2
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  camera: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
